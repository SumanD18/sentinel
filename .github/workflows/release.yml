name: Release

# Publishes the Python SDK (sentinel-llm) to PyPI. Uses PyPI Trusted Publishing
# (OIDC) - no API token stored.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   Project name:     sentinel-llm
#   Owner:            SumanD18
#   Repository:       sentinel
#   Workflow name:    release.yml
#   Environment:      pypi
# Add it as a "pending publisher", then run this workflow (Actions -> Release ->
# Run workflow, or `gh workflow run release.yml`). PyPI creates the project
# automatically on the first successful upload.
#
# After Trusted Publishing is configured you can make releases auto-publish by
# adding the following back to the `on:` block:
#   release:
#     types: [published]

on:
  workflow_dispatch:

jobs:
  pypi:
    name: Build and publish sentinel-llm to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: packages/sdk-python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        working-directory: packages/sdk-python
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist
