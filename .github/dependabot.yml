version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python packages
  - package-ecosystem: pip
    directory: /packages/sdk-python
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: /packages/evaluators
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: /server
    schedule:
      interval: weekly

  # Node packages
  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /packages/sdk-typescript
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
