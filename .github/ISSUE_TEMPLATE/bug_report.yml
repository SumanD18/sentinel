name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that triggers the bug.
      placeholder: |
        1. sentinel.wrap(OpenAI())
        2. call ...
        3. observe ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Python SDK
        - TypeScript SDK
        - Server / collector
        - Dashboard
        - Evaluators
        - Docker / deployment
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version or commit SHA.
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python/Node version, provider library versions.
    validations:
      required: false
